<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nikhil Prasad | Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      width: 100%;
      background: red;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      animation: fadeInBg 2.5s ease-in-out forwards;
    }

    @keyframes fadeInBg {
      from { opacity: 0; transform: scale(1.05); }
      to { opacity: 1; transform: scale(1); }
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
      background: rgba(0, 0, 0, 0.4);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
      animation: slideUp 1.6s ease forwards;
      max-width: 90%;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
      color: cyan;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
    }

    .content p {
      font-size: 1.2rem;
      margin-bottom: 40px;
      color: #f0f8ff;
    }

    .content a {
      display: inline-block;
      padding: 14px 36px;
      background: cyan;
      color: #000;
      font-size: 18px;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
      transition: all 0.3s ease-in-out;
    }

    .content a:hover {
      background: #00bcd4;
      transform: scale(1.08);
      box-shadow: 0 0 35px rgba(0, 255, 255, 0.9);
    }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: #ccc;
      font-size: 14px;
      z-index: 2;
    }

    /* Fade transition effect */
    .fade-out {
      opacity: 0;
      transition: opacity 1s ease;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .content h1 {
        font-size: 2.2rem;
      }
      .content p {
        font-size: 1rem;
      }
      .content a {
        font-size: 16px;
        padding: 12px 28px;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 30px;
      }
      .content h1 {
        font-size: 1.8rem;
      }
      .content p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="content">
    <h1>Welcome to My Portfolio</h1>
    <p>I'm <strong>Nikhil Prasad</strong> — Cloud & Networking Enthusiast, Learner, and Achiever</p>
    <a href="#" id="enterBtn">Enter Portfolio →</a>
  </div>

  <footer>© 2025 Nikhil Prasad | All Rights Reserved</footer>

  <script>
    const enterBtn = document.getElementById('enterBtn');
    enterBtn.addEventListener('click', (e) => {
      e.preventDefault();
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = "index98.html";
      }, 1000);
    });
  </script>
</body>
</html>
